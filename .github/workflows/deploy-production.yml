name: Deploy to Production

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.14.0'
          cache: 'npm'
          cache-dependency-path: website/package-lock.json

      - name: Install dependencies
        working-directory: ./website
        run: npm ci

      - name: Build Astro site
        working-directory: ./website
        run: npm run build

      - name: Backup previous deployment
        run: |
          sudo apt-get update && sudo apt-get install -y lftp

          # Fail immediately if any command fails
          set -e

          # Verify credentials are set
          if [ -z "${{ secrets.FTP_USERNAME }}" ] || [ -z "${{ secrets.FTP_PASSWORD }}" ] || [ -z "${{ secrets.FTP_SERVER }}" ]; then
            echo "Error: FTP credentials not configured"
            exit 1
          fi

          # Create backup with copy (not move) - fails if connection issues
          lftp -e "
            set ssl:verify-certificate no;
            open -u ${{ secrets.FTP_USERNAME }},${{ secrets.FTP_PASSWORD }} ${{ secrets.FTP_SERVER }} || exit 1;
            mirror -R public_html/www public_html/www_bak_$(date +%Y%m%d_%H%M%S) || exit 1;
            bye
          " || exit 1

      - name: Deploy to FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./website/dist/
          server-dir: ./public_html/www
          dangerous-clean-slate: false
